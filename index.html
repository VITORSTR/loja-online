<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VitorCELL</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .produto {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .produto img {
      width: 100%;
      border-radius: 10px;
    }
    .botao {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      background: green;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>Minha Loja Virtual</h1>
  <p>Produtos com qualidade e ótimo preço</p>
</header>

<div class="container">

  <div class="produto">
    <img src="https://via.placeholder.com/200" alt="Produto 1">
    <h3>Produto 1</h3>
    <p>R$ 50,00</p>
    <a class="botao" href="https://wa.me/5599999999999" target="_blank">Comprar</a>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/200" alt="Produto 2">
    <h3>Produto 2</h3>
    <p>R$ 80,00</p>
    <a class="botao" href="https://wa.me/5599999999999" target="_blank">Comprar</a>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/200" alt="Produto 3">
    <h3>Produto 3</h3>
    <p>R$ 120,00</p>
    <a class="botao" href="https://wa.me/5599999999999" target="_blank">Comprar</a>
  </div>

</div>

</body>
</html>
